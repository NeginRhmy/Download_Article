name: Upload file from URL to repo
on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'Direct URL of the file to download'
        required: true
        type: string
      filename:
        description: 'Name to save the file as (e.g., paper.pdf)'
        required: true
        type: string

jobs:
  upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download file
        run: |
          curl -L -o "${{ inputs.filename }}" "${{ inputs.file_url }}"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ inputs.filename }}"
          git commit -m "Add file from URL: ${{ inputs.file_url }}" || echo "No changes"
          git push
